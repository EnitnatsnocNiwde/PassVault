<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Tailwind vs shadcn 一键切换主题</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* shadcn theme via data-theme */
[data-theme="dark"] { --bg: #09090b; --card: rgba(24,24,27,0.95); --fg: #fafafa; --sub: #71717a; --border: #27272a; --inp: #09090b; --btn-p-bg: #fafafa; --btn-p-fg: #09090b; --btn-s-bg: #27272a; --btn-s-fg: #a1a1aa; --accent: #818cf8; --row-bg: #1f1f23; --row-fg: #d4d4d8; }
[data-theme="light"] { --bg: #f8fafc; --card: rgba(255,255,255,0.95); --fg: #18181b; --sub: #a1a1aa; --border: #e4e4e7; --inp: #fff; --btn-p-bg: #18181b; --btn-p-fg: #fafafa; --btn-s-bg: #f4f4f5; --btn-s-fg: #71717a; --accent: #6366f1; --row-bg: #f4f4f5; --row-fg: #3f3f46; }

body { font-family: system-ui; margin: 0; background: #1a1a2e; display: flex; flex-direction: column; height: 100vh; }
.tabs { display: flex; background: #0f0f1a; padding: 6px 8px; gap: 4px; }
.tab { padding: 8px 16px; border: none; border-radius: 8px; font-size: 12px; cursor: pointer; color: #888; background: transparent; }
.tab.active { background: #2a2a3e; color: #7c83ff; font-weight: 600; }
.panel { flex: 1; display: none; align-items: center; justify-content: center; padding: 30px; position: relative; }
.panel.active { display: flex; }
.panel-body { display: flex; gap: 40px; align-items: flex-start; max-width: 820px; width: 100%; }
.theme-btn { position: absolute; top: 10px; right: 16px; padding: 6px 16px; border-radius: 8px; font-size: 12px; cursor: pointer; z-index: 10; border: 1px solid; background: transparent; }

/* Tailwind panel */
#tw { background: #f8fafc; }
#tw.dark { background: #0f172a; }
#tw .theme-btn { color: #64748b; border-color: #94a3b8; }
#tw.dark .theme-btn { color: #94a3b8; border-color: #475569; }

/* shadcn panel */
#sd { background: var(--bg); }
#sd .theme-btn { color: var(--fg); border-color: var(--border); }
.sd-card {
  background: var(--card); backdrop-filter: blur(12px); border: 1px solid var(--border);
  border-radius: 14px; padding: 32px 28px; width: 320px; text-align: center;
}
.sd-title { font-size: 21px; font-weight: 600; color: var(--fg); margin: 4px 0; }
.sd-sub { font-size: 12px; color: var(--sub); margin-bottom: 16px; }
.sd-inp {
  width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; background: var(--inp); color: var(--fg); margin-bottom: 10px; outline: none;
  transition: border .15s, box-shadow .15s;
}
.sd-inp::placeholder { color: var(--sub); }
.sd-inp:focus { border-color: var(--accent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 25%, transparent); }
.sd-btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 6px; }
.sd-btn-p { background: var(--btn-p-bg); color: var(--btn-p-fg); }
.sd-btn-s { background: var(--btn-s-bg); color: var(--btn-s-fg); }
.sd-divider { font-size: 11px; color: var(--sub); margin: 12px 0; }
.sd-table { flex: 1; min-width: 280px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.sd-th { display: flex; padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 11px; color: var(--sub); font-weight: 500; background: color-mix(in srgb, var(--bg) 50%, var(--border)); }
.sd-tr { display: flex; padding: 8px 14px; border-bottom: 1px solid var(--row-bg); font-size: 12px; color: var(--row-fg); transition: .15s; }
.sd-tr:hover { background: color-mix(in srgb, var(--accent) 4%, transparent); }
.sd-tr:last-child { border-bottom: none; }
.col-w { flex: 1.2; } .col-m { flex: 1; } .col-s { flex: 1; text-align: center; }
.col-p { flex: 1; text-align: center; color: var(--accent); font-family: monospace; }
</style>
</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="switchTab('tw')">5. Tailwind（内置 dark: 类）</button>
  <button class="tab" onclick="switchTab('sd')">6. shadcn（CSS 变量驱动）</button>
</div>

<!-- Tailwind -->
<div class="panel active" id="tw">
  <button class="theme-btn" onclick="this.parentElement.classList.toggle('dark');this.textContent=this.parentElement.classList.contains('dark')?'☀️ 浅色模式':'🌙 深色模式'">🌙 深色模式</button>
  <div class="panel-body">
    <!-- Tailwind card -->
    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-lg dark:shadow-slate-900/20 p-8 w-[320px] text-center border border-slate-100 dark:border-slate-700">
      <div class="text-3xl mb-1">🔒</div>
      <div class="text-xl font-semibold text-slate-800 dark:text-slate-100 mb-1">密码保管箱</div>
      <div class="text-sm text-slate-400 dark:text-slate-500 mb-4">请输入主密码解锁</div>
      <input type="password" placeholder="主密码" value="••••••••" class="w-full px-4 py-2.5 text-sm border border-slate-200 dark:border-slate-600 rounded-xl mb-3 bg-white dark:bg-slate-900 dark:text-slate-200 dark:placeholder-slate-500 focus:outline-none focus:border-indigo-400 dark:focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 dark:focus:ring-indigo-900 transition">
      <button class="w-full py-2.5 bg-indigo-500 hover:bg-indigo-600 dark:bg-indigo-600 dark:hover:bg-indigo-500 text-white text-sm font-medium rounded-xl transition shadow-lg shadow-indigo-200 dark:shadow-indigo-900/30">解锁</button>
      <div class="text-xs text-slate-300 dark:text-slate-600 my-3">———— 或 ————</div>
      <input placeholder="恢复密钥" class="w-full px-4 py-2.5 text-sm border border-slate-200 dark:border-slate-600 rounded-xl mb-3 bg-white dark:bg-slate-900 dark:text-slate-200 dark:placeholder-slate-500 focus:outline-none focus:border-indigo-400 dark:focus:border-indigo-500 transition">
      <button class="w-full py-2.5 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 text-sm font-medium rounded-xl transition">验证密钥</button>
    </div>
    <!-- Tailwind table -->
    <div class="flex-1 bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden">
      <div class="flex px-4 py-2.5 border-b border-slate-100 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-900/50 text-xs font-semibold text-slate-400 dark:text-slate-500">
        <span class="col-s">ID</span><span class="col-w">网站</span><span class="col-m">别称</span><span class="col-m">账号</span><span class="col-s">密码</span><span class="col-m">描述</span>
      </div>
      <div class="flex px-4 py-2.5 border-b border-slate-50 dark:border-slate-700/50 text-sm text-slate-600 dark:text-slate-300 hover:bg-indigo-50/30 dark:hover:bg-indigo-900/20 transition">
        <span class="col-s text-slate-400 dark:text-slate-500">1</span><span class="col-w">github.com</span><span class="col-m">GitHub</span><span class="col-m">user@mail</span><span class="col-p">****</span><span class="col-m">开发</span>
      </div>
      <div class="flex px-4 py-2.5 border-b border-slate-50 dark:border-slate-700/50 text-sm text-slate-600 dark:text-slate-300 hover:bg-indigo-50/30 dark:hover:bg-indigo-900/20 transition">
        <span class="col-s text-slate-400 dark:text-slate-500">2</span><span class="col-w">google.com</span><span class="col-m">Google</span><span class="col-m">user@mail</span><span class="col-p">****</span><span class="col-m">-</span>
      </div>
      <div class="flex px-4 py-2.5 text-sm text-slate-600 dark:text-slate-300 hover:bg-indigo-50/30 dark:hover:bg-indigo-900/20 transition">
        <span class="col-s text-slate-400 dark:text-slate-500">3</span><span class="col-w">notion.so</span><span class="col-m">Notion</span><span class="col-m">user@mail</span><span class="col-p">****</span><span class="col-m">笔记</span>
      </div>
    </div>
  </div>
</div>

<!-- shadcn -->
<div class="panel" id="sd" data-theme="dark">
  <button class="theme-btn" onclick="var p=document.getElementById('sd');var n=p.getAttribute('data-theme')==='dark'?'light':'dark';p.setAttribute('data-theme',n);this.textContent=n==='dark'?'☀️ 浅色模式':'🌙 深色模式'">☀️ 浅色模式</button>
  <div class="panel-body">
    <div class="sd-card">
      <div style="font-size:34px;margin-bottom:4px">🔒</div>
      <div class="sd-title">密码保管箱</div>
      <div class="sd-sub">请输入主密码解锁</div>
      <input class="sd-inp" type="password" placeholder="主密码" value="••••••••">
      <button class="sd-btn sd-btn-p">解锁</button>
      <div class="sd-divider">———— 或 ————</div>
      <input class="sd-inp" placeholder="恢复密钥">
      <button class="sd-btn sd-btn-s">验证密钥</button>
    </div>
    <div class="sd-table">
      <div class="sd-th"><span class="col-s">ID</span><span class="col-w">网站</span><span class="col-m">别称</span><span class="col-m">账号</span><span class="col-s">密码</span><span class="col-m">描述</span></div>
      <div class="sd-tr"><span class="col-s">1</span><span class="col-w">github.com</span><span class="col-m">GitHub</span><span class="col-m">user@mail</span><span class="col-p">****</span><span class="col-m">开发</span></div>
      <div class="sd-tr"><span class="col-s">2</span><span class="col-w">google.com</span><span class="col-m">Google</span><span class="col-m">user@mail</span><span class="col-p">****</span><span class="col-m">-</span></div>
      <div class="sd-tr"><span class="col-s">3</span><span class="col-w">notion.so</span><span class="col-m">Notion</span><span class="col-m">user@mail</span><span class="col-p">****</span><span class="col-m">笔记</span></div>
    </div>
  </div>
</div>

<script>
function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.includes(id.toUpperCase())));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === id));
}
</script>
</body>
</html>
